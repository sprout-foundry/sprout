name: Chromatic Visual Regression

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/ui/**'
  push:
    branches:
      - main
    paths:
      - 'packages/ui/**'

concurrency:
  group: chromatic-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Publish to Chromatic
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/ui/package-lock.json

      - name: Install dependencies
        working-directory: packages/ui
        run: npm ci

      - name: Validate workflow configuration
        run: node --test .github/workflows/__tests__/chromatic-workflow.test.js

      - name: Publish to Chromatic
        uses: chromaui/chromatic-action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDirectory: packages/ui
          buildCommandName: build-storybook
          onlyChanged: true
          exitZeroOnChanges: true
