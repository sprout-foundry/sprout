name: sprout-agent-smoke

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Which mode to test: review, fix, or plan'
        required: true
        default: 'fix'
        type: choice
        options:
          - fix
          - plan
      issue_number:
        description: 'Issue number for fix/plan mode'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ─── REVIEW MODE: inline comments on a PR with real bugs ───
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: sprout-foundry/sprout-agent@main
        with:
          mode: review
          primary-provider: deepinfra
          primary-model: deepseek-ai/DeepSeek-V3.1
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deepinfra-api-key: ${{ secrets.DEEPINFRA_API_KEY }}
          max-iterations: "60"
          max-budget-usd: "1.00"
          timeout-minutes: "10"
          review-type: comprehensive
          comment-threshold: low
          debug: "true"

  # ─── FIX / PLAN MODE: triggered manually with an issue number ───
  fix-or-plan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: sprout-foundry/sprout-agent@main
        with:
          mode: ${{ inputs.test_mode }}
          primary-provider: deepinfra
          primary-model: deepseek-ai/DeepSeek-V3.1
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deepinfra-api-key: ${{ secrets.DEEPINFRA_API_KEY }}
          max-iterations: "100"
          max-budget-usd: "2.00"
          timeout-minutes: "20"
          debug: "true"
        env:
          ISSUE_NUMBER_OVERRIDE: ${{ inputs.issue_number }}
