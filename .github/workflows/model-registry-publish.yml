name: Publish Model Registry

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Generate per-provider model files
        env:
          LEDIT_MODEL_REGISTRY_URL: "disabled" # Disable registry so CLI hits provider APIs directly for fresh data
          SPROUT_MODEL_REGISTRY_URL: "disabled"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          CHUTES_API_KEY: ${{ secrets.CHUTES_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: go run ./cmd/refresh_provider_catalog --registry-dir=models

      - name: Sync embedded provider configs with canonical registry
        run: go run ./cmd/sync_provider_configs --registry-dir=models

      - name: Enrich new models with capability probes
        # Probes only NEW + eligible + within-budget models (vs the live
        # registry), capped at --max-probes, so the daily inference spend stays
        # small. Prior probe results are carried forward for known models.
        env:
          LEDIT_MODEL_REGISTRY_URL: "disabled"
          SPROUT_MODEL_REGISTRY_URL: "disabled"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          CHUTES_API_KEY: ${{ secrets.CHUTES_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: go run ./cmd/enrich_registry --registry-dir=models --max-probe-cost=0.10 --max-probes=50

      - name: Generate model index
        run: bash scripts/generate-model-index.sh models/models

      - name: Copy provider configs with metadata
        # Pulls from two sources:
        #   pkg/agent_providers/configs/           (embedded built-ins)
        #   pkg/agent_providers/community-configs/ (remote-only, NOT embedded)
        # The community path lets a contributor add a provider to GitHub
        # Pages without growing the binary. Cross-dir id collisions are
        # caught by generate-provider-index.sh below.
        #
        # Local-only providers (non-HTTPS endpoint, e.g. lmstudio at
        # http://127.0.0.1) are skipped: they ship embedded in the binary
        # and are meaningless to remote fetchers, which would reject them
        # anyway — the registry requires HTTPS (SSRF guard). The same
        # filter runs in generate-provider-index.sh so the index lists
        # exactly the providers that got copied.
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p providers
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          for cfg in pkg/agent_providers/configs/*.json \
                     pkg/agent_providers/community-configs/*.json; do
            [[ -f "$cfg" ]] || continue
            name=$(basename "$cfg")
            ep=$(jq -r '.endpoint // ""' "$cfg")
            if [[ "${ep,,}" != https://* ]]; then
              echo "skip $name (non-HTTPS endpoint, local-only): $ep"
              continue
            fi
            jq --arg sv 1 --arg ts "$TIMESTAMP" \
              '. + {schema_version: ($sv | tonumber), published_at: $ts}' \
              "$cfg" > "providers/$name"
          done

      - name: Generate provider index
        run: bash scripts/generate-provider-index.sh

      - name: Validate published provider configs
        # Runs the same schema check that pkg/providerregistry applies
        # at runtime — catches malformed configs in CI rather than 6h
        # later when every client rejects the bad file.
        run: go run ./cmd/validate_registry providers/

      - name: Assemble registry artifacts
        run: |
          mkdir -p registry-artifacts
          cp -r models registry-artifacts/models
          cp -r providers registry-artifacts/providers

      - name: Upload registry artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: registry-artifacts

  pages:
    needs: publish
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
