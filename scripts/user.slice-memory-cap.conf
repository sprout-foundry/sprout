# SP-104: Systemd memory guardrails for OOM protection
#
# This drop-in caps the user session's memory at 48 GB (on a 64 GB host)
# so that runaway processes (e.g. an uncapped vitest pool) get OOM-killed
# before desktop glue (wireplumber, pipewire, gnome-keyring) dies.
#
# Without this, the kernel OOM-killer has no cgroup boundary to respect —
# it kills whatever has the worst oom_score_adj × RSS, which can mean
# audio and DBus services die while vitest workers keep respawning.
#
# INSTALLATION (requires sudo):
#   sudo mkdir -p /etc/systemd/system/user.slice.d
#   sudo cp scripts/user.slice-memory-cap.conf /etc/systemd/system/user.slice.d/memory-cap.conf
#   sudo systemctl daemon-reload
#   systemctl show user.slice | grep MemoryMax   # verify: MemoryMax=51539607552
#
# ADJUST FOR YOUR RAM:
#   48G = 48 × 1024³ = 51539607552 bytes
#   For a 32 GB host: MemoryMax=24G (25769803776)
#   For a 128 GB host: MemoryMax=96G (103079215104)
#
# To temporarily disable: systemctl set-property user.slice MemoryMax=infinity

[Slice]
# SP-104: Cap user session memory. On a 64 GB host, 48G leaves 16 GB
# headroom for the kernel, systemd core, and system services (sshd,
# networkd, etc.) so the session never starves the base system.
MemoryMax=48G

# SP-104: Keep user processes at the default OOM score (0). The kernel
# will prefer killing user processes over system services (which are
# typically at -250 or lower). Combined with MemoryMax, this ensures the
# user session is the one that gets trimmed, not the system.
#
# Individual runaway processes can be further deprioritized at launch:
#   systemd-run --scope -p OOMScoreAdjust=500 vitest run
OOMScoreAdjust=0
