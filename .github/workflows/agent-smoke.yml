name: sprout-agent-smoke

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: sprout-foundry/sprout-agent@main
        with:
          mode: review
          primary-provider: deepinfra
          primary-model: deepseek-ai/DeepSeek-V3.1
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deepinfra-api-key: ${{ secrets.DEEPINFRA_API_KEY }}
          max-iterations: "60"
          max-budget-usd: "1.00"
          timeout-minutes: "10"
          review-type: comprehensive
          comment-threshold: low
          debug: "true"
