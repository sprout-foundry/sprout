name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          # Install basic dependencies for integration tests
          pip install requests pytest
        fi

    - name: Install dependencies
      run: go mod download

    - name: Run go vet
      run: make vet

    - name: Check gofmt
      run: make fmt-check

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Install Node.js dependencies (root workspaces)
      # Single `npm ci` from root installs every workspace
      # (packages/events, packages/ui, webui) plus root devDeps.
      # Per-workspace `npm install` in the past pruned root devDeps.
      run: npm ci

    - name: Build shared workspace packages
      # webui imports @sprout/events and @sprout/ui from their `dist/`
      # outputs (no `prepare` script — removed in 61ba3f17).
      run: |
        npm run build -w @sprout/events
        npm run build -w @sprout/ui

    - name: Lint frontend
      run: make lint

    - name: Check for duplicate components (SP-039 enforcement)
      run: bash scripts/check-no-duplicate-components.sh

    - name: Run full build pipeline (make build-all)
      run: make build-all

    - name: Commit updated UI assets
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add pkg/webui/static/
        git diff --cached --quiet || git commit -m "chore: update embedded UI assets [skip ci]"

    - name: Install goimports
      run: go install golang.org/x/tools/cmd/goimports@latest

    - name: Run unit tests with race detection and coverage
      env:
        CI: "true"
      run: make test-coverage

    - name: Display coverage summary
      if: always()
      run: |
        if [ -f /tmp/sprout-coverage.out ]; then
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=/tmp/sprout-coverage.out | grep "^total:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages with Lowest Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=/tmp/sprout-coverage.out | grep -v "^total:" | awk -F" " '{print $NF, $0}' | sort -n | head -15 | awk '{$1=""; print substr($0,2)}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Coverage file not found at /tmp/sprout-coverage.out" >> $GITHUB_STEP_SUMMARY
          echo "Test run may have failed before generating coverage data." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Generate coverage function details
      if: always()
      run: |
        if [ -f /tmp/sprout-coverage.out ]; then
          go tool cover -func=/tmp/sprout-coverage.out > /tmp/sprout-coverage-func.txt
          echo "Generated coverage function details"
        else
          echo "Coverage file not found, skipping coverage function details generation"
        fi

    - name: Upload coverage report
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: /tmp/sprout-coverage.out
        retention-days: 30

    - name: Upload coverage function details
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: coverage-function-details
        path: /tmp/sprout-coverage-func.txt
        retention-days: 30

    - name: Upload test logs
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: /tmp/sprout-test-coverage.log
        retention-days: 30

    - name: Run smoke tests
      run: make test-smoke

  # WASM tool roster smoke test — runs once on Linux regardless of
  # the test job's matrix. The script cross-compiles the WASM target
  # and asserts the SP-112-6/8 excluded tools stay excluded; it
  # doesn't need to run on macOS/Windows because the build output
  # is OS-agnostic (it's a list of .go file inclusion decisions).
  wasm-smoke:
    name: WASM tool roster smoke
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25

    - name: Run WASM tool roster smoke test
      shell: bash
      run: bash scripts/wasm-tool-roster-smoke.sh

  build:
    name: Build Binaries
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25

    - name: Install dependencies
      run: go mod download

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Install Node.js dependencies (root workspaces)
      # Single `npm ci` from root installs every workspace
      # (packages/events, packages/ui, webui) plus root devDeps.
      # Per-workspace `npm install` in the past pruned root devDeps.
      run: npm ci

    - name: Build shared workspace packages
      # webui imports @sprout/events and @sprout/ui from their `dist/`
      # outputs (no `prepare` script — removed in 61ba3f17).
      run: |
        npm run build -w @sprout/events
        npm run build -w @sprout/ui

    - name: Build UI and WASM assets (make deploy-ui build-wasm)
      shell: bash
      run: make deploy-ui build-wasm

    - name: Set build variables
      id: set_vars
      shell: bash
      run: |
        OS_NAME=""
        EXT=""
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          OS_NAME="windows"
          EXT=".exe"
        elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          OS_NAME="darwin"
        else
          OS_NAME="linux"
        fi
        echo "os_name=${OS_NAME}" >> $GITHUB_OUTPUT
        echo "ext=${EXT}" >> $GITHUB_OUTPUT
        echo "binary_name=sprout-${OS_NAME}-${{ matrix.arch }}" >> $GITHUB_OUTPUT

    - name: Build
      env:
        GOOS: ${{ steps.set_vars.outputs.os_name }}
        GOARCH: ${{ matrix.arch }}
      run: go build -tags "browser" -o ${{ steps.set_vars.outputs.binary_name }}${{ steps.set_vars.outputs.ext }} .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.set_vars.outputs.binary_name }}
        path: ${{ steps.set_vars.outputs.binary_name }}${{ steps.set_vars.outputs.ext }}
