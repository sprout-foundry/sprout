name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on pushes to tags like v1.0.0, v1.1.0-beta, etc.

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          # Install basic dependencies for integration tests
          pip install requests pytest
        fi

    - name: Install dependencies
      run: go mod download

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Install Node.js dependencies (root workspaces)
      # Single `npm ci` from root installs every workspace
      # (packages/events, packages/ui, webui) plus root devDeps.
      run: npm ci

    - name: Build shared workspace packages
      # webui imports @sprout/events and @sprout/ui from their `dist/`
      # outputs (no `prepare` script — removed in 61ba3f17).
      run: |
        npm run build -w @sprout/events
        npm run build -w @sprout/ui

    - name: Type check
      run: npm run type-check -w sprout-webui

    - name: Build and deploy React UI
      run: make deploy-ui

    - name: Verify embedded React UI assets are current
      run: make verify-ui-embedded

    - name: Install goimports
      run: go install golang.org/x/tools/cmd/goimports@latest

    - name: Prepare grammar blobs
      run: make prepare-grammars

    - name: Run unit tests with race detection and coverage
      env:
        CI: "true"
      run: make test-coverage

    - name: Run integration tests
      run: make test-integration

    - name: Run smoke tests
      run: make test-smoke

  # Desktop installers are built by the dedicated `desktop-release.yml`
  # workflow (six-platform matrix with signing + prebuilt backends), which
  # also fires on `v*` tags. A second desktop pipeline here would only
  # duplicate that work.

  build:
    name: Build and Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Create the GitHub Release + upload assets
      id-token: write   # OIDC token used by actions/attest-build-provenance
      attestations: write # Publish the provenance attestation to the repo

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Fetch full history for changelog generation

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: go mod download

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Install Node.js dependencies (root workspaces)
      # Single `npm ci` from root installs every workspace
      # (packages/events, packages/ui, webui) plus root devDeps.
      run: npm ci

    - name: Build shared workspace packages
      # webui imports @sprout/events and @sprout/ui from their `dist/`
      # outputs (no `prepare` script — removed in 61ba3f17).
      run: |
        npm run build -w @sprout/events
        npm run build -w @sprout/ui

    - name: Type check
      run: npm run type-check -w sprout-webui

    - name: Get the version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Prepare grammar blobs
      run: make prepare-grammars

    - name: Build and deploy React UI
      shell: bash
      run: make deploy-ui

    - name: Verify embedded React UI assets are current
      shell: bash
      run: make verify-ui-embedded

    - name: Commit embedded UI assets and package version bumps to release tag
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add pkg/webui/static/ packages/ui/package.json packages/events/package.json
        git diff --cached --quiet || (
          git commit -m "chore: embed UI assets and sync package versions for ${{ steps.get_version.outputs.VERSION }}"
          git tag -f ${{ steps.get_version.outputs.VERSION }} HEAD
          git push origin ${{ steps.get_version.outputs.VERSION }} --force
        )

    - name: Generate changelog
      run: |
        # Generate changelog from git history since last tag
        VERSION=${GITHUB_REF#refs/tags/}
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
        
        # Create temporary changelog for this release
        TEMP_CHANGELOG=$(mktemp)
        
        echo "## [$VERSION] - $(date +%Y-%m-%d)" > $TEMP_CHANGELOG
        echo "" >> $TEMP_CHANGELOG
        
        if [ -n "$LAST_TAG" ]; then
          git log --pretty=format:"- %s (%h)" --abbrev-commit "$LAST_TAG..HEAD" >> $TEMP_CHANGELOG 2>/dev/null || \
          echo "- No changes detected since last tag" >> $TEMP_CHANGELOG
        else
          echo "- Initial release" >> $TEMP_CHANGELOG
        fi
        echo "" >> $TEMP_CHANGELOG
        
        # If CHANGELOG.md exists, prepend new content; otherwise create fresh
        if [ -f "CHANGELOG.md" ]; then
          # Insert new release section at the top (after header)
          HEADER=$(head -n 4 CHANGELOG.md)
          TAIL=$(tail -n +5 CHANGELOG.md)
          echo "$HEADER" > CHANGELOG.md.new
          echo "" >> CHANGELOG.md.new
          cat $TEMP_CHANGELOG >> CHANGELOG.md.new
          echo "" >> CHANGELOG.md.new
          echo "$TAIL" >> CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md
        else
          # Create new changelog
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "All notable changes to Sprout will be documented in this file." >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat $TEMP_CHANGELOG >> CHANGELOG.md
        fi
        
        rm -f $TEMP_CHANGELOG
        echo "Generated changelog for $VERSION"
        cat CHANGELOG.md

    - name: Commit changelog
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add CHANGELOG.md
        git commit -m "docs: Update changelog for $VERSION" || echo "No changes to commit"
        git push origin HEAD:main

    - name: Update README with version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        if [ -f "README.md" ]; then
          sed -i.bak -E "s/(Version: )[^ ]+/\1$VERSION/" README.md
          rm -f README.md.bak
          echo "Updated README with version $VERSION"
        fi

    - name: Build multi-platform binaries
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        COMMIT=$(git rev-parse --short HEAD)
        DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        
        # Build ldflags
        LDFLAGS="-X 'github.com/sprout-foundry/sprout/cmd.version=$VERSION'"
        LDFLAGS="$LDFLAGS -X 'github.com/sprout-foundry/sprout/cmd.gitCommit=$COMMIT'"
        LDFLAGS="$LDFLAGS -X 'github.com/sprout-foundry/sprout/cmd.buildDate=$DATE'"
        LDFLAGS="$LDFLAGS -X 'github.com/sprout-foundry/sprout/cmd.gitTag=$VERSION'"
        
        echo "Using ldflags: $LDFLAGS"
        
        # Build for Linux (AMD64)
        GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o sprout-linux-amd64 .
        tar -czvf sprout-linux-amd64.tar.gz sprout-linux-amd64

        # Build for Linux (ARM64)
        GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o sprout-linux-arm64 .
        tar -czvf sprout-linux-arm64.tar.gz sprout-linux-arm64

        # Build for Windows (AMD64)
        GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o sprout-windows-amd64.exe .
        zip sprout-windows-amd64.zip sprout-windows-amd64.exe

        # Build for macOS (AMD64)
        GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o sprout-darwin-amd64 .
        tar -czvf sprout-darwin-amd64.tar.gz sprout-darwin-amd64

        # Build for macOS (ARM64)
        GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o sprout-darwin-arm64 .
        tar -czvf sprout-darwin-arm64.tar.gz sprout-darwin-arm64

    - name: Generate SHA256SUMS
      # Consumed by scripts/install.{sh,ps1} to verify the downloaded archive
      # before chmod+x'ing it. Format matches `sha256sum -c` (and `shasum -a 256 -c`)
      # so anyone can re-verify by hand:
      #   curl -sL .../SHA256SUMS | sha256sum -c --ignore-missing
      run: |
        sha256sum \
          sprout-linux-amd64.tar.gz \
          sprout-linux-arm64.tar.gz \
          sprout-windows-amd64.zip \
          sprout-darwin-amd64.tar.gz \
          sprout-darwin-arm64.tar.gz \
          > SHA256SUMS
        cat SHA256SUMS

    - name: Stamp Homebrew formula
      # Substitutes the version + per-platform SHA256s into the formula
      # template at Formula/sprout.rb (using scripts/update-homebrew-formula.sh)
      # and uploads the stamped copy as a release asset. Users can install
      # from URL without a tap repo:
      #   brew install --formula https://github.com/sprout-foundry/sprout/releases/latest/download/sprout.rb
      # Or, once sprout-foundry/homebrew-tap exists:
      #   brew tap sprout-foundry/sprout
      #   brew install sprout
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        ./scripts/update-homebrew-formula.sh "$VERSION" SHA256SUMS sprout.rb
        echo "--- stamped formula ---"
        cat sprout.rb

    - name: Attest build provenance
      # SLSA v1.0 build provenance signed via GitHub OIDC (keyless cosign).
      # The attestation ties the tarballs to *this workflow run / this
      # commit*, so downstream verification can prove the binaries came
      # from sprout-foundry/sprout's release pipeline rather than a
      # tampered upload.
      #
      # Verification (power users):
      #   gh attestation verify sprout-linux-amd64.tar.gz \
      #     --repo sprout-foundry/sprout
      #
      # Not required by install.{sh,ps1} because gh isn't on most user
      # machines — SHA256SUMS still gives integrity; this gives provenance.
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: |
          sprout-linux-amd64.tar.gz
          sprout-linux-arm64.tar.gz
          sprout-windows-amd64.zip
          sprout-darwin-amd64.tar.gz
          sprout-darwin-arm64.tar.gz

    - name: Build WASM shell module
      # Required by the cloud webui bundle (sprout.wasm is copied into the
      # bundle's wasm/ directory by build-webui-dist.mjs).
      run: make build-wasm

    - name: Build cloud-mode webui bundle for platform vendoring
      run: node scripts/build-webui-dist.mjs --mode cloud --output dist/sprout-webui-cloud

    - name: Package cloud-mode webui bundle
      # Stable filename (no version embedded) so platform's vendor workflow
      # can fetch the latest with `gh release download --pattern`. The
      # bundle's wasm/version.json carries the actual sprout version.
      run: tar -czvf sprout-webui-cloud.tar.gz -C dist sprout-webui-cloud

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          sprout-linux-amd64.tar.gz
          sprout-linux-arm64.tar.gz
          sprout-windows-amd64.zip
          sprout-darwin-amd64.tar.gz
          sprout-darwin-arm64.tar.gz
          SHA256SUMS
          sprout.rb
          sprout-webui-cloud.tar.gz
        name: Release ${{ steps.get_version.outputs.VERSION }}
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Release ${{ steps.get_version.outputs.VERSION }}

          Multi-platform CLI binaries and Electron desktop installers, plus a
          cloud-mode web bundle for sprout-foundry vendoring. See the Assets
          section below for the full list of artifacts uploaded by this and
          the desktop-release workflow.

          ### Version Information
          Each binary includes:
          - Version: ${{ steps.get_version.outputs.VERSION }}
          - Git commit information
          - Build timestamp

          Run `sprout version` to see detailed version information.

          For installation instructions, please refer to the README.md documentation.
        draft: false
        prerelease: false
