name: Publish @sprout/ui to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish
        required: false
        type: string

concurrency:
  group: publish-ui
  cancel-in-progress: true

jobs:
  publish-ui:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/ui/package-lock.json

      - name: Install dependencies
        run: cd packages/ui && npm ci

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        working-directory: packages/ui
        run: npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version

      - name: Build
        run: cd packages/ui && npm run build

      - name: Run tests
        run: cd packages/ui && npm test

      - name: Run type check
        run: cd packages/ui && npm run type-check

      - name: Verify working directory
        run: |
          cd packages/ui
          echo "Publishing from: $(pwd)"
          echo "Package name: $(node -p "require('./package.json').name")"
          echo "Package version: $(node -p "require('./package.json').version")"

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        working-directory: packages/ui
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Release tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "✅ Version matches: v${PKG_VERSION}"

      - name: Publish to npm
        working-directory: packages/ui
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
