name: Desktop Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  module-syntax:
    name: Desktop Module Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Syntax-check all desktop modules
        run: npm run test:desktop-smoke:modules

  electron-smoke:
    name: Electron App Smoke Tests
    runs-on: ubuntu-latest
    needs: module-syntax
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright and Electron dependencies
        run: |
          npx playwright install-deps chromium
          # Electron uses its own bundled Chromium, no browser download needed

      - name: Install system dependencies for Electron
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xauth \
            libgbm1

      - name: Set up Node.js webui
        run: |
          cd webui && npm ci

      - name: Build launcher HTML assets
        run: |
          # The launcher.html is already committed; ensure desktop JS deps are available
          ls desktop/launcher.html

      - name: Run module syntax smoke test (no display needed)
        run: |
          node -e "
            const {spawnSync} = require('child_process');
            const path = require('path');
            const fs = require('fs');
            const d = 'desktop';
            const skip = ['main.js.bak'];
            const mods = fs.readdirSync(d)
              .filter(f => f.endsWith('.js') && !skip.includes(f))
              .sort();
            let failed = false;
            for (const m of mods) {
              const r = spawnSync(process.execPath, ['--check', path.join(d, m)], { encoding: 'utf8' });
              if (r.status !== 0) {
                console.error('FAIL', m, r.stderr.trim());
                failed = true;
              } else {
                console.log('OK  ', m);
              }
            }
            if (failed) process.exit(1);
          "

      - name: Run Electron smoke tests (with virtual display)
        env:
          DISPLAY: ':99'
          ELECTRON_DISABLE_SECURITY_WARNINGS: 'true'
          CI: 'true'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          npm run test:desktop-smoke -- --reporter=list
        timeout-minutes: 5

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-results
          path: test-results/
          retention-days: 7
