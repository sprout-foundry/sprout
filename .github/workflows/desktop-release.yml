name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          webui/package-lock.json

    - name: Install root dependencies
      run: npm ci

    - name: Install web UI dependencies
      run: npm ci
      working-directory: webui

    - name: Build desktop installers
      run: npm run desktop:dist

    - name: Verify packaged desktop bundle
      run: npm run desktop:verify

    - name: Upload desktop artifacts
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          desktop/dist/releases/*.dmg
          desktop/dist/releases/*.zip
          desktop/dist/releases/*.exe
          desktop/dist/releases/*.AppImage
          desktop/dist/releases/*.deb
          desktop/dist/releases/*.rpm
        append_body: true
        body: |
          Desktop installers built from the Electron shell while preserving the existing Go backend and embedded web UI.

    - name: Upload workflow artifacts
      uses: actions/upload-artifact@v4
      with:
        name: desktop-${{ matrix.os }}
        path: desktop/dist/releases/
        if-no-files-found: error
