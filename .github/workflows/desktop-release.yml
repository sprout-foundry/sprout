name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: write
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: linux
            arch: x64
            runs_on: ubuntu-latest
          - label: linux-arm64
            os: linux
            arch: arm64
            runs_on: ubuntu-24.04-arm
          - label: macos-x64
            os: macos
            arch: x64
            runs_on: macos-15-intel
          - label: macos-arm64
            os: macos
            arch: arm64
            runs_on: macos-latest
          - label: windows-x64
            os: windows
            arch: x64
            runs_on: windows-latest
          - label: windows-arm64
            os: windows
            arch: arm64
            runs_on: windows-11-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          webui/package-lock.json

    - name: Install root dependencies
      run: npm ci

    - name: Install web UI dependencies
      run: npm ci
      working-directory: webui

    - name: Type check
      run: |
        cd webui && npm run type-check

    - name: Prepare macOS signing certificate
      if: matrix.os == 'macos'
      shell: bash
      env:
        CSC_LINK_B64: ${{ secrets.CSC_LINK }}
      run: |
        if [ -z "$CSC_LINK_B64" ]; then
          echo "No CSC_LINK secret configured; skipping macOS signing certificate setup."
          exit 0
        fi
        CERT_PATH="$RUNNER_TEMP/ledit-signing-cert.p12"
        printf '%s' "$CSC_LINK_B64" | base64 --decode > "$CERT_PATH"
        echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
        echo "Prepared signing certificate at $CERT_PATH"

    - name: Build desktop installers
      env:
        npm_config_arch: ${{ matrix.arch }}
        CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      run: npm run desktop:dist

    - name: Verify packaged desktop bundle
      run: npm run desktop:verify

    - name: Upload desktop artifacts
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          desktop/dist/releases/*.dmg
          desktop/dist/releases/*.zip
          desktop/dist/releases/*.exe
          desktop/dist/releases/*.AppImage
          desktop/dist/releases/*.deb
          desktop/dist/releases/*.rpm
        append_body: true
        body: |
          Desktop installers built from the Electron shell while preserving the existing Go backend and embedded web UI.

    - name: Upload workflow artifacts
      uses: actions/upload-artifact@v4
      with:
        name: desktop-${{ matrix.label }}
        path: desktop/dist/releases/
        if-no-files-found: error
