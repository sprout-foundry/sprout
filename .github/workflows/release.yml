name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on pushes to tags like v1.0.0, v1.1.0-beta, etc.

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.25

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        else
          # Install basic dependencies for integration tests
          pip install requests pytest
        fi

    - name: Install dependencies
      run: go mod download

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build workspace packages
      run: |
        (cd packages/events && npm install && npm run build)
        (cd packages/ui && npm install && npm run build)

    - name: Install Node.js dependencies
      run: |
        cd webui && npm ci

    - name: Type check
      run: |
        cd webui && npm run type-check

    - name: Build and deploy React UI
      run: make deploy-ui

    - name: Verify embedded React UI assets are current
      run: make verify-ui-embedded

    - name: Install goimports
      run: go install golang.org/x/tools/cmd/goimports@latest

    - name: Run unit tests with race detection and coverage
      env:
        CI: "true"
      run: make test-coverage

    - name: Run integration tests
      run: make test-integration

    - name: Run smoke tests
      run: make test-smoke

  desktop-release:
    name: Build Desktop Release
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build and publish desktop app
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        npm run desktop:release

    - name: Upload desktop artifacts
      uses: actions/upload-artifact@v4
      with:
        name: desktop-${{ matrix.os }}
        path: desktop/dist/*
        retention-days: 30

  build:
    name: Build and Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a GitHub Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch full history for changelog generation

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: go mod download

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build workspace packages
      run: |
        (cd packages/events && npm install && npm run build)
        (cd packages/ui && npm install && npm run build)

    - name: Install Node.js dependencies
      run: |
        cd webui && npm ci

    - name: Type check
      run: |
        cd webui && npm run type-check

    - name: Get the version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build and deploy React UI
      shell: bash
      run: make deploy-ui

    - name: Verify embedded React UI assets are current
      shell: bash
      run: make verify-ui-embedded

    - name: Commit embedded UI assets to release tag
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add pkg/webui/static/
        git diff --cached --quiet || (
          git commit -m "chore: embed UI assets for ${{ steps.get_version.outputs.VERSION }}"
          git tag -f ${{ steps.get_version.outputs.VERSION }} HEAD
          git push origin ${{ steps.get_version.outputs.VERSION }} --force
        )

    - name: Generate changelog
      run: |
        # Generate changelog from git history since last tag
        VERSION=${GITHUB_REF#refs/tags/}
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
        
        # Create temporary changelog for this release
        TEMP_CHANGELOG=$(mktemp)
        
        echo "## [$VERSION] - $(date +%Y-%m-%d)" > $TEMP_CHANGELOG
        echo "" >> $TEMP_CHANGELOG
        
        if [ -n "$LAST_TAG" ]; then
          git log --pretty=format:"- %s (%h)" --abbrev-commit "$LAST_TAG..HEAD" >> $TEMP_CHANGELOG 2>/dev/null || \
          echo "- No changes detected since last tag" >> $TEMP_CHANGELOG
        else
          echo "- Initial release" >> $TEMP_CHANGELOG
        fi
        echo "" >> $TEMP_CHANGELOG
        
        # If CHANGELOG.md exists, prepend new content; otherwise create fresh
        if [ -f "CHANGELOG.md" ]; then
          # Insert new release section at the top (after header)
          HEADER=$(head -n 4 CHANGELOG.md)
          TAIL=$(tail -n +5 CHANGELOG.md)
          echo "$HEADER" > CHANGELOG.md.new
          echo "" >> CHANGELOG.md.new
          cat $TEMP_CHANGELOG >> CHANGELOG.md.new
          echo "" >> CHANGELOG.md.new
          echo "$TAIL" >> CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md
        else
          # Create new changelog
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "All notable changes to Sprout will be documented in this file." >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat $TEMP_CHANGELOG >> CHANGELOG.md
        fi
        
        rm -f $TEMP_CHANGELOG
        echo "Generated changelog for $VERSION"
        cat CHANGELOG.md

    - name: Commit changelog
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add CHANGELOG.md
        git commit -m "docs: Update changelog for $VERSION" || echo "No changes to commit"
        git push origin HEAD:main

    - name: Update README with version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        if [ -f "README.md" ]; then
          sed -i.bak -E "s/(Version: )[^ ]+/\1$VERSION/" README.md
          rm -f README.md.bak
          echo "Updated README with version $VERSION"
        fi

    - name: Build multi-platform binaries
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        COMMIT=$(git rev-parse --short HEAD)
        DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        
        # Build ldflags
        LDFLAGS="-X 'github.com/sprout-foundry/sprout/cmd.version=$VERSION'"
        LDFLAGS="$LDFLAGS -X 'github.com/sprout-foundry/sprout/cmd.gitCommit=$COMMIT'"
        LDFLAGS="$LDFLAGS -X 'github.com/sprout-foundry/sprout/cmd.buildDate=$DATE'"
        LDFLAGS="$LDFLAGS -X 'github.com/sprout-foundry/sprout/cmd.gitTag=$VERSION'"
        
        echo "Using ldflags: $LDFLAGS"
        
        # Build for Linux (AMD64)
        GOOS=linux GOARCH=amd64 go build -tags ollama_test -ldflags "$LDFLAGS" -o sprout-linux-amd64 .
        tar -czvf sprout-linux-amd64.tar.gz sprout-linux-amd64

        # Build for Linux (ARM64)
        GOOS=linux GOARCH=arm64 go build -tags ollama_test -ldflags "$LDFLAGS" -o sprout-linux-arm64 .
        tar -czvf sprout-linux-arm64.tar.gz sprout-linux-arm64

        # Build for Windows (AMD64)
        GOOS=windows GOARCH=amd64 go build -tags ollama_test -ldflags "$LDFLAGS" -o sprout-windows-amd64.exe .
        zip sprout-windows-amd64.zip sprout-windows-amd64.exe

        # Build for macOS (AMD64)
        GOOS=darwin GOARCH=amd64 go build -tags ollama_test -ldflags "$LDFLAGS" -o sprout-darwin-amd64 .
        tar -czvf sprout-darwin-amd64.tar.gz sprout-darwin-amd64

        # Build for macOS (ARM64)
        GOOS=darwin GOARCH=arm64 go build -tags ollama_test -ldflags "$LDFLAGS" -o sprout-darwin-arm64 .
        tar -czvf sprout-darwin-arm64.tar.gz sprout-darwin-arm64

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          sprout-linux-amd64.tar.gz
          sprout-linux-arm64.tar.gz
          sprout-windows-amd64.zip
          sprout-darwin-amd64.tar.gz
          sprout-darwin-arm64.tar.gz
        name: Release ${{ steps.get_version.outputs.VERSION }}
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Release ${{ steps.get_version.outputs.VERSION }}

          This release includes multi-platform CLI binaries and desktop applications built with proper version information.

          ### CLI Binaries
          - `sprout-linux-amd64.tar.gz` - Linux AMD64
          - `sprout-linux-arm64.tar.gz` - Linux ARM64
          - `sprout-windows-amd64.zip` - Windows AMD64
          - `sprout-darwin-amd64.tar.gz` - macOS Intel
          - `sprout-darwin-arm64.tar.gz` - macOS Apple Silicon

          ### Desktop Applications
          - `Sprout-*.dmg` - macOS Desktop App
          - `Sprout-*.exe` - Windows Desktop App
          - `Sprout-*.AppImage` - Linux Desktop App

          ### Version Information
          Each binary includes:
          - Version: ${{ steps.get_version.outputs.VERSION }}
          - Git commit information
          - Build timestamp

          Run `sprout version` to see detailed version information.

          For installation instructions, please refer to the README.md documentation.
        draft: false
        prerelease: false
