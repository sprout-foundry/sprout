name: Publish Model Registry

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Generate per-provider model files
        env:
          LEDIT_MODEL_REGISTRY_URL: "disabled" # Disable registry so CLI hits provider APIs directly for fresh data
          SPROUT_MODEL_REGISTRY_URL: "disabled"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          CHUTES_API_KEY: ${{ secrets.CHUTES_API_KEY }}
        run: go run ./cmd/refresh_provider_catalog --registry-dir=models

      - name: Enrich new models with capability probes
        # Probes only NEW + eligible + within-budget models (vs the live
        # registry), capped at --max-probes, so the daily inference spend stays
        # small. Prior probe results are carried forward for known models.
        env:
          LEDIT_MODEL_REGISTRY_URL: "disabled"
          SPROUT_MODEL_REGISTRY_URL: "disabled"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          CHUTES_API_KEY: ${{ secrets.CHUTES_API_KEY }}
        run: go run ./cmd/enrich_registry --registry-dir=models --max-probe-cost=0.10 --max-probes=50

      - name: Generate model index
        run: bash scripts/generate-model-index.sh models/models

      - name: Generate provider index
        run: bash scripts/generate-provider-index.sh

      - name: Assemble registry artifacts
        run: |
          mkdir -p registry-artifacts
          cp -r models registry-artifacts/models
          cp -r providers registry-artifacts/providers

      - name: Upload registry artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: registry-artifacts

  pages:
    needs: publish
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
